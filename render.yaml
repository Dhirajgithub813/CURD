services:
  - type: web
    name: crud-app-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
