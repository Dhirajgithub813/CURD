services:
  - type: web
    name: crud-app-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      # Optional: Add MongoDB for persistent storage
      # - key: MONGODB_URI
      #   value: "mongodb+srv://username:password@cluster.mongodb.net/crud-app?retryWrites=true&w=majority"
