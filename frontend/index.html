<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - CRUD App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 Task Manager</h1>
            <p>A Simple CRUD Application</p>
        </header>

        <section class="form-section">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title:</label>
                    <input type="text" id="taskTitle" placeholder="Enter task title" required>
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description:</label>
                    <textarea id="taskDescription" placeholder="Enter task description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Create Task</button>
            </form>
        </section>

        <section class="tasks-section">
            <h2>Tasks</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <div id="tasksList" class="tasks-list">
                <p class="no-tasks">No tasks yet. Add one to get started!</p>
            </div>
        </section>
    </div>

    <!-- Read Modal -->
    <div id="readModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReadModal()">&times;</span>
            <h2>View Task</h2>
            <div class="form-group">
                <label>Task Title:</label>
                <p id="readTitle" class="read-text"></p>
            </div>
            <div class="form-group">
                <label>Description:</label>
                <p id="readDescription" class="read-text"></p>
            </div>
            <div class="form-group">
                <label>Status:</label>
                <p id="readStatus" class="read-text"></p>
            </div>
            <div class="form-group">
                <label>Created Date:</label>
                <p id="readDate" class="read-text"></p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Update Task</h2>
            <form id="editForm">
                <div class="form-group">
                    <label for="editTitle">Task Title:</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editDescription">Description:</label>
                    <textarea id="editDescription" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
